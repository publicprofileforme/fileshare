<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>fileshare · receive</title>
<style>
:root,[data-theme="light"]{--bg:#f7f6f2;--surface:#f0efeb;--border:#d4d1ca;--text:#28251d;--muted:#7a7974;--primary:#01696f;--primary-h:#0c4e54;--success:#437a22;--drop-bg:#e0f0f0;--entry-bg:#f0efeb}
[data-theme="dark"]{--bg:#171614;--surface:#1c1b19;--border:#393836;--text:#cdccca;--muted:#797876;--primary:#4f98a3;--primary-h:#227f8b;--success:#6daa45;--drop-bg:#1c2b2c;--entry-bg:#22211f}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:15px;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;width:100%;max-width:520px;display:flex;flex-direction:column;gap:1.25rem}
h1{font-size:1.2rem;font-weight:600;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.badge{font-size:.7rem;font-weight:700;padding:.15rem .5rem;border-radius:99px;background:var(--success);color:#fff;letter-spacing:.05em}
.tabs{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px}
.tab{flex:1;padding:.45rem .8rem;border-radius:6px;border:none;background:none;color:var(--muted);font-size:.88rem;font-weight:500;cursor:pointer;transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center;gap:.4rem}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px oklch(0 0 0/.12)}
.tab:hover:not(.active){color:var(--text)}
.panel{display:none;flex-direction:column;gap:1rem}
.panel.active{display:flex}
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:2rem 1.5rem;text-align:center;cursor:pointer;transition:background .18s,border-color .18s;display:flex;flex-direction:column;align-items:center;gap:.6rem;color:var(--muted)}
.drop-zone.over{background:var(--drop-bg);border-color:var(--primary);color:var(--primary)}
.drop-zone input{display:none}
.file-list{list-style:none;display:flex;flex-direction:column;gap:.35rem}
.file-list li{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.55rem .9rem;font-size:.9rem;display:flex;justify-content:space-between;align-items:center}
.file-list .nm{word-break:break-all}
.file-list .sz{color:var(--muted);font-size:.8rem;white-space:nowrap;margin-left:.5rem}
textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--text);font-size:.95rem;width:100%;resize:vertical;min-height:120px;font-family:inherit;transition:border-color .18s;line-height:1.5}
textarea:focus{outline:none;border-color:var(--primary)}
.btn{border:none;border-radius:8px;padding:.65rem 1.2rem;font-size:.9rem;font-weight:600;cursor:pointer;background:var(--primary);color:#fff;width:100%;transition:background .18s;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn:hover{background:var(--primary-h)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.success{background:var(--success)}
.progress-bar{height:4px;background:var(--border);border-radius:99px;overflow:hidden;display:none}
.progress-fill{height:100%;background:var(--primary);width:0;transition:width .3s}
.result{padding:.75rem 1rem;border-radius:8px;font-size:.9rem;display:none;align-items:center;gap:.5rem}
.result.ok{display:flex;background:color-mix(in oklch,var(--success) 12%,var(--surface));border:1px solid color-mix(in oklch,var(--success) 30%,var(--border));color:var(--success)}
.result.err{display:flex;background:color-mix(in oklch,#a12c7b 12%,var(--surface));border:1px solid color-mix(in oklch,#a12c7b 30%,var(--border));color:#d163a7}
hr{border:none;border-top:1px solid var(--border)}
.log-header{font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.text-log{display:flex;flex-direction:column;gap:.5rem;max-height:320px;overflow-y:auto}
.text-entry{background:var(--entry-bg);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;display:flex;flex-direction:column;gap:.5rem}
.entry-header{display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.entry-time{font-size:.75rem;color:var(--muted)}
.copy-btn{border:none;background:none;color:var(--muted);cursor:pointer;padding:.2rem .5rem;border-radius:4px;font-size:.75rem;display:flex;align-items:center;gap:.25rem;transition:color .15s,background .15s;flex-shrink:0;white-space:nowrap}
.copy-btn:hover{color:var(--text);background:var(--border)}
.copy-btn.success{color:var(--success)}
.entry-text{font-size:.92rem;white-space:pre-wrap;word-break:break-word;line-height:1.5}
.log-empty{color:var(--muted);font-size:.88rem;text-align:center;padding:1.5rem 0}
</style>
</head>
<body>
<div class="card">
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    fileshare · receive
    <span class="badge">RECV</span>
  </h1>
  <div class="tabs">
    <button class="tab active" id="tabFiles" onclick="switchTab('files')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      Files
    </button>
    <button class="tab" id="tabText" onclick="switchTab('text')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Text
    </button>
  </div>

  <!-- Files panel -->
  <div class="panel active" id="panelFiles">
    <div class="drop-zone" id="dz" onclick="document.getElementById('fi').click()">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--primary)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>Drag &amp; drop files here, or click to select</span>
      <input type="file" id="fi" multiple>
    </div>
    <ul class="file-list" id="fl"></ul>
    <div class="progress-bar" id="pb"><div class="progress-fill" id="pf"></div></div>
    <button class="btn" id="sb" disabled onclick="uploadFiles()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Send files
    </button>
    <div class="result" id="fileResult"></div>
  </div>

  <!-- Text panel -->
  <div class="panel" id="panelText">
    <textarea id="textInput" placeholder="Type or paste text to send…" rows="5"></textarea>
    <button class="btn" id="textBtn" onclick="sendText()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Send text
    </button>
    <div class="result" id="textResult"></div>
    <hr>
    <div class="log-header">Received messages</div>
    <div class="text-log" id="textLog">
      <div class="log-empty">No messages yet</div>
    </div>
  </div>
</div>

<script>
// ── Clipboard ─────────────────────────────────────────────────────────────────
function clipboardWrite(text, btn) {
  var origHTML = btn ? btn.innerHTML : null;
  function onSuccess() {
    if (!btn) return;
    btn.classList.add('success');
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied';
    setTimeout(function(){ btn.classList.remove('success'); if(origHTML) btn.innerHTML = origHTML; }, 2000);
  }
  function execFallback() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;width:2em;height:2em;padding:0;border:none;outline:none;background:transparent;opacity:0.01;z-index:9999';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, ta.value.length);
    var ok = false;
    try { ok = document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    if (ok) onSuccess();
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(execFallback);
  } else {
    execFallback();
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  ['Files','Text'].forEach(function(t) {
    document.getElementById('panel'+t).classList.toggle('active', t.toLowerCase()===tab);
    document.getElementById('tab'+t).classList.toggle('active', t.toLowerCase()===tab);
  });
  if (tab === 'text') loadTextLog();
}

// ── File upload ───────────────────────────────────────────────────────────────
var files = [];
function fmt(n) { var u=['B','KB','MB','GB'],i=0; while(n>=1024&&i<3){n/=1024;i++;} return n.toFixed(i?1:0)+' '+u[i]; }

function renderList() {
  document.getElementById('fl').innerHTML = files.map(function(f){
    return '<li><span class="nm">'+f.name+'</span><span class="sz">'+fmt(f.size)+'</span></li>';
  }).join('');
  document.getElementById('sb').disabled = files.length === 0;
}

document.getElementById('fi').addEventListener('change', function(e){ files=[...e.target.files]; renderList(); });
var dz = document.getElementById('dz');
dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', function(){ dz.classList.remove('over'); });
dz.addEventListener('drop', function(e){ e.preventDefault(); dz.classList.remove('over'); files=[...e.dataTransfer.files]; renderList(); });

async function uploadFiles() {
  if (!files.length) return;
  var sb=document.getElementById('sb'), pb=document.getElementById('pb'),
      pf=document.getElementById('pf'), res=document.getElementById('fileResult');
  sb.disabled=true; pb.style.display='block'; pf.style.width='10%'; res.className='result';
  var fd=new FormData();
  files.forEach(function(f){ fd.append('files',f); });
  try {
    pf.style.width='50%';
    var r=await fetch('/upload',{method:'POST',body:fd});
    pf.style.width='100%';
    if(r.ok){ var d=await r.json(); res.className='result ok'; res.textContent='✓ Saved: '+d.saved.join(', '); files=[]; renderList(); }
    else { res.className='result err'; res.textContent='✗ '+(await r.text()); }
  } catch(e){ res.className='result err'; res.textContent='✗ '+e.message; }
  sb.disabled=false;
  setTimeout(function(){ pb.style.display='none'; pf.style.width='0'; },1500);
}

// ── Text send ─────────────────────────────────────────────────────────────────
async function sendText() {
  var text=document.getElementById('textInput').value.trim();
  if (!text) return;
  var btn=document.getElementById('textBtn'), res=document.getElementById('textResult');
  btn.disabled=true;
  try {
    var r=await fetch('/send-text',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})});
    if(r.ok){ res.className='result ok'; res.textContent='✓ Sent!'; document.getElementById('textInput').value=''; loadTextLog(); setTimeout(function(){res.className='result';},3000); }
    else { res.className='result err'; res.textContent='✗ '+(await r.text()); }
  } catch(e){ res.className='result err'; res.textContent='✗ '+e.message; }
  btn.disabled=false;
}

// ── Text log ──────────────────────────────────────────────────────────────────
var COPY_SVG = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';

// Store texts so buttons can access them without JSON.stringify in onclick
var textEntries = [];

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadTextLog() {
  var r = await fetch('/api/texts');
  if (!r.ok) return;
  var entries = await r.json();
  var log = document.getElementById('textLog');
  if (!entries || entries.length === 0) {
    log.innerHTML = '<div class="log-empty">No messages yet</div>';
    textEntries = [];
    return;
  }
  // Store reversed so index matches DOM order
  textEntries = [...entries].reverse();
  log.innerHTML = textEntries.map(function(e, i){
    return '<div class="text-entry">'
      + '<div class="entry-header">'
      + '<span class="entry-time">'+escHtml(e.time)+'</span>'
      + '<button class="copy-btn" data-idx="'+i+'">'+COPY_SVG+'</button>'
      + '</div>'
      + '<div class="entry-text">'+escHtml(e.text)+'</div>'
      + '</div>';
  }).join('');

  // Attach listeners after DOM is built
  log.querySelectorAll('.copy-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var idx = parseInt(btn.getAttribute('data-idx'), 10);
      clipboardWrite(textEntries[idx].text, btn);
    });
  });
}

setInterval(function(){
  if (document.getElementById('panelText').classList.contains('active')) loadTextLog();
}, 3000);
</script>
</body>
</html>
